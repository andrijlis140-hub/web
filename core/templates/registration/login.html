{% extends 'base.html' %}

{% block content %}
<style>
    /* Контейнер для центрування форми */
    .login-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 70vh; /* Щоб форма була по центру екрана */
        padding: 20px;
    }

    /* Стиль самої картки входу */
    .login-card {
        background-color: #fffdf5; /* Кремовий колір під пергамент */
        padding: 40px;
        border-radius: 8px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        border: 2px solid #d4af37; /* Золотиста рамка */
        width: 100%;
        max-width: 400px;
        text-align: center;
    }

    .login-card h2 {
        color: #1a1a1a;
        margin-bottom: 30px;
        font-family: 'Georgia', serif; /* Більш "книжковий" шрифт */
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    /* Стилізація полів форми Django */
    .login-card p {
        text-align: left;
        margin-bottom: 20px;
    }

    .login-card input {
        width: 100%;
        padding: 12px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
    }

    /* Стиль золотої кнопки */
    .login-button {
        background-color: #d4af37;
        color: white;
        padding: 12px 30px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        transition: background 0.3s;
        width: 100%;
        margin-top: 10px;
    }

    .login-button:hover {
        background-color: #b8962e;
    }
</style>

<div class="login-container">
    <div class="login-card">
        <h2>Вхід у систему</h2>
        
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="login-button">УВІЙТИ</button>
        </form>
    </div>
</div>
{% endblock %}
