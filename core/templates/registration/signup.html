{% extends 'base.html' %}

{% block content %}
<style>
    .login-container { display: flex; justify-content: center; align-items: center; min-height: 70vh; padding: 20px; }
    .login-card { background-color: #fffdf5; padding: 40px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 2px solid #d4af37; width: 100%; max-width: 400px; text-align: center; }
    .login-card h2 { color: #1a1a1a; margin-bottom: 30px; font-family: 'Georgia', serif; text-transform: uppercase; letter-spacing: 2px; }
    .login-card p { text-align: left; margin-bottom: 20px; }
    .login-card input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    .login-button { background-color: #d4af37; color: white; padding: 12px 30px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-top: 10px; }
    .login-button:hover { background-color: #b8962e; }
</style>

<div class="login-container">
    <div class="login-card">
        <h2>Реєстрація</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="login-button">ЗАРЕЄСТРУВАТИСЯ</button>
        </form>
        <p style="margin-top: 15px; text-align: center;"> Вже маєте акаунт? <a href="{% url 'login' %}">Увійти</a></p>
    </div>
</div>
{% endblock %}
