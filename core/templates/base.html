<!DOCTYPE html>
<html>
<head>
    <title>Магазин</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
        }

        header {
            background: #222;
            color: white;
            padding: 15px;
        }

        nav a, nav button {
            color: white;
            margin-right: 15px;
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        nav a:hover, nav button:hover {
            text-decoration: underline;
        }

        .container {
            padding: 20px;
        }

        footer {
            background: #eee;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>

<header>
    <h2>🛒 Магазин</h2>

    <nav>
        <a href="/">Головна</a>
        <a href="/categories/">Категорії</a>
        <a href="/products/">Товари</a>

        {% if user.is_authenticated %}
            <form action="{% url 'logout' %}" method="post" style="display:inline;">
                {% csrf_token %}
                <button type="submit">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
        {% endif %}
    </nav>
</header>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

<footer>
    <p>2026 © My Django Site</p>
</footer>

</body>
</html>
